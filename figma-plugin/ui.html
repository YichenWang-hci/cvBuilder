<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font: 12px/1.4 Inter, sans-serif;
        margin: 12px;
        color: #111;
      }
      textarea {
        width: 100%;
        height: 160px;
        box-sizing: border-box;
        font: 11px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
        resize: vertical;
      }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        margin-top: 4px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      button {
        margin-top: 10px;
        width: 100%;
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        background: #111;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #status {
        margin-top: 10px;
        white-space: pre-wrap;
        color: #333;
      }
      label {
        display: block;
        margin-top: 8px;
        font-weight: 600;
      }
      .hint {
        color: #666;
        font-weight: 400;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <label>
      Payload JSON
      <span class="hint">from figma-fill-payload.json</span>
    </label>
    <textarea id="payload" placeholder="Paste the FULL contents of figma-fill-payload.json here (Cmd+A in the file, then Cmd+C). Do not use placeholder text."></textarea>

    <label>
      Template frame name
      <span class="hint">optional — leave empty to fill current page</span>
    </label>
    <input id="templateFrame" type="text" placeholder="" />

    <button id="fill">Fill resume</button>
    <div id="status"></div>

    <script>
      const payloadEl = document.getElementById("payload");
      const templateFrameEl = document.getElementById("templateFrame");
      const fillBtn = document.getElementById("fill");
      const statusEl = document.getElementById("status");

      fillBtn.onclick = () => {
        statusEl.textContent = "Filling…";
        fillBtn.disabled = true;
        parent.postMessage(
          {
            pluginMessage: {
              type: "fill",
              payloadText: payloadEl.value,
              templateFrameName: templateFrameEl.value.trim(),
              frameVisibility: {},
            },
          },
          "*"
        );
      };

      onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg || msg.type !== "result") return;
        fillBtn.disabled = false;
        if (!msg.ok) {
          statusEl.textContent = "Error: " + msg.error;
          return;
        }
        let text =
          "Done.\nFilled " +
          msg.filledCount +
          " layers in scope: " +
          msg.scope;
        if (msg.missingCount > 0) {
          text +=
            "\nMissing " +
            msg.missingCount +
            " layers:\n" +
            msg.missing.join("\n");
        }
        statusEl.textContent = text;
      };
    </script>
  </body>
</html>
